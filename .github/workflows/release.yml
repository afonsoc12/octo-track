name: 🚀 Release

concurrency: Release

on:
  push:
    branches:
      - master
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  ci:
    name: 🔍 CI
    uses: ./.github/workflows/ci.yml

  github-release:
    name: 📦 GitHub Release
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: 🏗️ Build wheel + sdist
        run: uv build

      - name: 🏷️ Determine release metadata
        id: meta
        run: |
          VERSION=$(uv version --short)
          SHORT_SHA=$(git rev-parse --short HEAD)
          IS_RELEASE=${{ startsWith(github.ref, 'refs/tags/v') }}
          if [ "$IS_RELEASE" = "true" ]; then
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-${VERSION}+${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: 📖 Extract changelog notes
        id: changelog
        uses: release-flow/keep-a-changelog-action@v3
        with:
          command: query
          version: ${{ startsWith(github.ref, 'refs/tags/v') && 'latest' || 'unreleased' }}

      - name: 🚀 Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.release-notes }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: dist/*

  build:
    name: 🐳 Build & Push Docker Image
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          activate-environment: true

      - name: 🏷️ Determine tags
        id: tags
        run: |
          VERSION=$(uv version --short)
          SHORT_SHA=$(git rev-parse --short HEAD)
          IS_RELEASE=${{ startsWith(github.ref, 'refs/tags/v') }}

          if [ "$IS_RELEASE" = "true" ]; then
            echo "tags=ghcr.io/afonsoc12/octo-track:${VERSION},ghcr.io/afonsoc12/octo-track:latest" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/afonsoc12/octo-track:dev,ghcr.io/afonsoc12/octo-track:dev-${VERSION}+${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version=dev-${VERSION}+${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and push
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🐳 Docker Build Summary

          ## Build Information
          - **Status**: ✅ Success
          - **Branch/Tag**: ${{ github.ref_name }}
          - **Commit SHA**: ${{ github.sha }}

          ## Tags
          ${{ steps.tags.outputs.tags }}
          EOF
